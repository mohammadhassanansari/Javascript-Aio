<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Tic Tac Toe</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      color: #00ff9f;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ff9f, 0 0 20px #00ff9f;
      letter-spacing: 2px;
    }

    .grid {
      display: inline-block;
      padding: 10px;
      border: 2px solid #00ff9f;
      box-shadow: 0 0 20px #00ff9f;
    }

    .row {
      display: flex;
    }

    .col {
      height: 100px;
      width: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      cursor: pointer;
      border: 1px solid #00ff9f;
      transition: all 0.3s ease;
    }

    /* Neon hover effect */
    .col:hover {
      background: rgba(0, 255, 159, 0.1);
      box-shadow: 0 0 15px #00ff9f inset, 0 0 10px #00ff9f;
      transform: scale(1.05);
    }

    /* X and O glow */
    .col:empty::after {
      content: "";
    }

    .col:not(:empty) {
      text-shadow: 0 0 10px #00ff9f, 0 0 20px #00ff9f;
    }

    /* Result text */
    #result {
      margin-top: 20px;
      font-size: 24px;
      text-shadow: 0 0 10px #00ff9f;
    }

    /* Button */
    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: transparent;
      border: 1px solid #00ff9f;
      color: #00ff9f;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ff9f;
      color: black;
      box-shadow: 0 0 15px #00ff9f;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>⚡ TIC TAC TOE ⚡</h1>

    <div class="grid">
      <div class="row">
        <div onclick="HandleClick(this)" id="0" class="col"></div>
        <div onclick="HandleClick(this)" id="1" class="col"></div>
        <div onclick="HandleClick(this)" id="2" class="col"></div>
      </div>
      <div class="row">
        <div onclick="HandleClick(this)" id="3" class="col"></div>
        <div onclick="HandleClick(this)" id="4" class="col"></div>
        <div onclick="HandleClick(this)" id="5" class="col"></div>
      </div>
      <div class="row">
        <div onclick="HandleClick(this)" id="6" class="col"></div>
        <div onclick="HandleClick(this)" id="7" class="col"></div>
        <div onclick="HandleClick(this)" id="8" class="col"></div>
      </div>
    </div>
  </div>

  <script src="Script.js"></script>
</body>
</html>
